# screen color
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:Tc"
set -as terminal-features ",xterm-256color:RGB"
set -ga terminal-overrides ",xterm-256color:Tc"

# enable mouse
set -g mouse on
unbind -T copy-mode-vi MouseDragEnd1Pane

# scrollback buffer size
set-option -g history-limit 50000

# status bar
set-option -g status-right " \"#{=22:pane_title}\" %l:%M %d-%b-%y"
set-window-option -g window-status-current-style 'fg=black,bg=#aaaaaa'
set-option -g status-position top

# use <C-h/j/k/l> to move between tmux panes
set -g @plugin 'mrjones2014/smart-splits.nvim'
bind-key -n C-h if -F '#{@pane-is-vim}' { send-keys C-h } { if -F '#{pane_at_left}'   '' 'select-pane -L' }
bind-key -n C-j if -F '#{@pane-is-vim}' { send-keys C-j } { if -F '#{pane_at_bottom}' '' 'select-pane -D' }
bind-key -n C-k if -F '#{@pane-is-vim}' { send-keys C-k } { if -F '#{pane_at_top}'    '' 'select-pane -U' }
bind-key -n C-l if -F '#{@pane-is-vim}' { send-keys C-l } { if -F '#{pane_at_right}'  '' 'select-pane -R' }
#bind-key -T copy-mode-vi 'C-h' select-pane -L
#bind-key -T copy-mode-vi 'C-j' select-pane -D
#bind-key -T copy-mode-vi 'C-k' select-pane -U
#bind-key -T copy-mode-vi 'C-l' select-pane -R

# don't delay after pressing <ESC> in vim
set-option -sg escape-time 0
# somehow make vim work better maybe?
set-option -g focus-events on

# use vim motion keys in copy mode
set-window-option -g mode-keys vi
# in tmux copy mode, start selecting text with v and copy it with y
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# specify tpm plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
# load tpm plugins. Use
#     git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# to install tpm on a new machine
run '~/.tmux/plugins/tpm/tpm'

# allow shift+enter to work
bind -n S-Enter send-keys Escape "[13;2u"

# allow gemini-notifier to work
set -g allow-passthrough on

# keep current path when splitting panes
bind-key '%' split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key 'c' new-window -c "#{pane_current_path}"

# make inactive panes lighter
set-window-option -g window-style 'bg=#222222'
set-window-option -g window-active-style 'bg=#000000'
set-option -g pane-border-style 'fg=#FFFFFF,bg=#222222'
set-option -g pane-active-border-style 'fg=#00FF00,bg=#000000'

# file path picker extension
# install fzf:
#   git clone --depth 1 https://github.com/junegunn/fzf.git ~/.fzf && ~/.fzf/install
# install fd
#   sudo apt-get update && sudo apt-get install fd-find
# install extension
#   curl -O https://raw.githubusercontent.com/raine/tmux-file-picker/main/tmux-file-picker && chmod +x tmux-file-picker && mv tmux-file-picker ~/.local/bin
bind C-f display-popup -E "tmux-file-picker"
